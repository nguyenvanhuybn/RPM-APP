services:
  - type: web
    name: rpm-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: rpm-db
          property: connectionString

databases:
  - name: rpm-db
    plan: free
    databaseName: rpm_db
    user: rpm_user
